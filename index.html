<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Marathon Records | My Running Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Full Marathon Records</h1>
            <p>42.195kmの挑戦と記録のアーカイブ</p>
        </div>
    </header>

    <main>
        <section class="summary">
            <div class="summary-card">
                <span class="label">Personal Best</span>
                <span class="value" id="pbDisplay">--:--:--</span>
            </div>
            <div class="summary-card">
                <span class="label">Total Runs</span>
                <span class="value" id="totalRunsDisplay">-- Races</span>
            </div>
        </section>

        <section>
            <h2>Running Map</h2>
            <div class="map-list">
                <div class="map-status">走破都道府県: <span id="prefCount">0</span> / 47</div>
                <div id="japan-map" class="japan-map"></div>
            </div>
        </section>

        <section class="record-list">
            <h2>Race History</h2>
            <div id="race-list-container"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 My Running Log</p>
    </footer>

    <script src="script.js"></script> 
</body>
</html>
